<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="n-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5F7F6"/>
      <stop offset="1" stop-color="#DCE0DE"/>
    </linearGradient>
    <clipPath id="n-squircle">
      <rect x="100" y="100" width="824" height="824" rx="185"/>
    </clipPath>
    <clipPath id="n-canvas">
      <rect x="216" y="216" width="592" height="592" rx="82"/>
    </clipPath>
    <filter id="n-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <filter id="n-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <linearGradient id="n-fade" gradientUnits="userSpaceOnUse" x1="512" y1="250" x2="512" y2="810">
      <stop offset="0" stop-color="#262C2C" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#262C2C" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="n-canvasgrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#E3E7E5"/>
      <stop offset="0.5" stop-color="#F0F2F1"/>
      <stop offset="1" stop-color="#F6F8F7"/>
    </linearGradient>
  </defs>

  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#n-bg)" filter="url(#n-shadow)"/>
  <rect x="101.5" y="101.5" width="821" height="821" rx="184" fill="none" stroke="#C9CECD" stroke-width="3"/>

  <g clip-path="url(#n-squircle)">
    <!-- canvas frame -->
    <rect x="205" y="205" width="614" height="614" rx="92" fill="url(#n-canvasgrad)" stroke="#262C2C" stroke-width="22"/>

    <!-- corner strokes on the canvas -->
    <g stroke="#262C2C" stroke-width="13" clip-path="url(#n-canvas)">
      <line x1="120" y1="500" x2="500" y2="120"/>
      <line x1="140" y1="620" x2="620" y2="140"/>
      <line x1="540" y1="820" x2="820" y2="540"/>
      <line x1="552" y1="928" x2="928" y2="552"/>
    </g>

    <!-- soft shadow: blurred offset copy of the pencil silhouette -->
    <g transform="translate(-45 45)" filter="url(#n-soft)">
      <path d="M 437 133 Q 437 105 465 105 L 559 105 Q 587 105 587 133 L 587 645 L 512 790 L 437 645 Z"
        transform="rotate(45 512 512)" fill="url(#n-fade)"/>
    </g>

    <!-- drawn line from the pencil tip -->
    <line x1="315" y1="709" x2="128" y2="896" stroke="#262C2C" stroke-width="13"/>

    <!-- pencil -->
    <g transform="rotate(45 512 512)">
      <!-- fills -->
      <path d="M 437 133 Q 437 105 465 105 L 559 105 Q 587 105 587 133 L 587 170 L 437 170 Z" fill="#EDEFEE"/>
      <rect x="437" y="170" width="150" height="45" fill="#C6CBCA"/>
      <rect x="437" y="215" width="50" height="430" fill="#DDB51E"/>
      <rect x="487" y="215" width="50" height="430" fill="#F7DC52"/>
      <rect x="537" y="215" width="50" height="430" fill="#F0CC2D"/>
      <polygon points="437,645 587,645 512,790" fill="#EDE0BA"/>
      <polygon points="482,734 542,734 512,790" fill="#3A4043"/>
      <!-- interior division lines -->
      <g stroke="#262C2C" stroke-width="11">
        <line x1="437" y1="170" x2="587" y2="170"/>
        <line x1="437" y1="215" x2="587" y2="215"/>
        <line x1="437" y1="645" x2="587" y2="645"/>
      </g>
      <g stroke="#262C2C" stroke-width="9" opacity="0.85">
        <line x1="487" y1="215" x2="487" y2="645"/>
        <line x1="537" y1="215" x2="537" y2="645"/>
      </g>
      <!-- highlights: short glint on the body, small shine on the eraser -->
      <line x1="503" y1="258" x2="503" y2="330" stroke="#FFFFFF" stroke-width="15" stroke-linecap="round" opacity="0.8"/>
      <path d="M 462 128 Q 468 114 484 112" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9"/>
      <!-- silhouette outline -->
      <path d="M 437 133 Q 437 105 465 105 L 559 105 Q 587 105 587 133 L 587 645 L 512 790 L 437 645 Z" fill="none" stroke="#262C2C" stroke-width="18" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
